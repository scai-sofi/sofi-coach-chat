name: Publish EAS Update

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Expo (EAS Update)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish EAS Update (production)
        working-directory: artifacts/mobile
        run: eas update --branch production --message "${{ github.event.head_commit.message || 'manual update' }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
